    // ==================== WEATHER API CONFIGURATION ====================
    const WEATHER_API_KEY = "bda0ef41ab934c00abe164419262403";

    let currentWeatherData = null;

    // ==================== WEATHER FUNCTIONS ====================
    async function fetchWeatherData() {
        try {
            const position = await getCurrentPosition();
            const { latitude, longitude } = position.coords;
            const url = `https://api.weatherapi.com/v1/current.json?key=${WEATHER_API_KEY}&q=${latitude},${longitude}&aqi=yes`;
            const response = await fetch(url);
            const data = await response.json();
            if (!data.error) {
                currentWeatherData = data;
                return data;
            }
        } catch (error) {
            console.log('Location failed, trying default city');
        }
        
        try {
            const url = `https://api.weatherapi.com/v1/current.json?key=${WEATHER_API_KEY}&q=London&aqi=yes`;
            const response = await fetch(url);
            const data = await response.json();
            if (!data.error) {
                currentWeatherData = data;
                return data;
            }
        } catch (error) {
            console.error('Weather fetch error:', error);
        }
        return null;
    }

    function getCurrentPosition() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) reject(new Error('Geolocation not supported'));
            navigator.geolocation.getCurrentPosition(resolve, reject);
        });
    }

    function getWeatherIcon(condition, isDay) {
        const conditionLower = condition.toLowerCase();
        if (conditionLower.includes('sun') || conditionLower.includes('clear')) {
            return isDay ? '<i class="fas fa-sun" style="color: #ffd966;"></i>' : '<i class="fas fa-moon" style="color: #c0c0c0;"></i>';
        }
        if (conditionLower.includes('cloud')) return '<i class="fas fa-cloud" style="color: #b0c4de;"></i>';
        if (conditionLower.includes('rain')) return '<i class="fas fa-cloud-rain" style="color: #6c91b2;"></i>';
        return '<i class="fas fa-cloud-sun"></i>';
    }

    function updateBackgroundTheme(condition) {
        const conditionLower = condition.toLowerCase();
        document.body.classList.remove('sunny-bg', 'cloudy-bg', 'rainy-bg', 'default-bg');
        
        if (conditionLower.includes('sun') || conditionLower.includes('clear')) {
            document.body.classList.add('sunny-bg');
        } else if (conditionLower.includes('cloud')) {
            document.body.classList.add('cloudy-bg');
        } else if (conditionLower.includes('rain')) {
            document.body.classList.add('rainy-bg');
        } else {
            document.body.classList.add('default-bg');
        }
    }

    function createWeatherEffects(condition) {
        document.querySelectorAll('.weather-bg-element').forEach(el => el.remove());

            const sun = document.createElement('div');

            document.body.appendChild(sun);

    // ==================== SOLAR DASHBOARD FUNCTIONS ====================
    function toggleRawData() {
        const rawDiv = document.getElementById('rawDataContent');

    function parseSolarData(rawText) {
        const result = {
            raw: rawText,
            powerKw: null,
            energyKwh: null,
            temperature: null,
            efficiency: null,
            co2Saved: null,
            irradiance: null,
            extraInsights: [],
            rawLines: rawText.split(/\r?\n/).filter(l => l.trim().length > 0)
        };

        const patterns = {
            power: /power\s*output\s*:?\s*([\d\.]+)\s*kw/i,
            energy: /energy\s*yield\s*:?\s*([\d\.]+)\s*kwh/i,
            temperature: /panel\s*temp(?:erature)?\s*:?\s*([\d\.]+)\s*°?c/i,
            efficiency: /efficiency\s*:?\s*([\d\.]+)\s*%/i,
            co2: /co2\s*saved\s*:?\s*([\d\.]+)\s*kg/i,
            irradiance: /irradiance\s*:?\s*([\d\.]+)\s*w\/m²/i,
        };

        for (let line of result.rawLines) {
            let match;
            if ((match = line.match(patterns.power))) result.powerKw = parseFloat(match[1]);
            else if ((match = line.match(patterns.energy))) result.energyKwh = parseFloat(match[1]);
            else if ((match = line.match(patterns.temperature))) result.temperature = parseFloat(match[1]);
            else if ((match = line.match(patterns.efficiency))) result.efficiency = parseFloat(match[1]);
            else if ((match = line.match(patterns.co2))) result.co2Saved = parseFloat(match[1]);
            else if ((match = line.match(patterns.irradiance))) result.irradiance = parseFloat(match[1]);
        }

        if (result.powerKw === null) {
            const anyPower = rawText.match(/(\d+(?:\.\d+)?)\s*kw/i);
            if (anyPower) result.powerKw = parseFloat(anyPower[1]);
        }
        if (result.energyKwh === null) {
            const anyEnergy = rawText.match(/(\d+(?:\.\d+)?)\s*kwh/i);
            if (anyEnergy) result.energyKwh = parseFloat(anyEnergy[1]);
        }
        if (result.temperature === null) {
            const anyTemp = rawText.match(/(\d+(?:\.\d+)?)\s*°?c/i);
            if (anyTemp) result.temperature = parseFloat(anyTemp[1]);
        }
        if (result.efficiency === null) result.efficiency = 18.7;
        if (result.co2Saved === null) result.co2Saved = 3.2;
        if (result.irradiance === null) result.irradiance = 780;

        return result;
    }

    function updateChart(production) {

        if (energyChart) {
            energyChart.destroy();
        }
        
        energyChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: hours,
                datasets: [{
                    label: 'Solar Generation (kW)',
                    data: productionData,
                    borderColor: '#ffd966',
                    backgroundColor: 'rgba(255, 217, 102, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#00d4ff',
                    pointBorderColor: '#fff',
                    pointRadius: 3,
                    pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { labels: { color: '#eef5ff', font: { size: 9 } } }
                },
                scales: {
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.1)' }, 
                        ticks: { color: '#eef5ff', font: { size: 9 } } 
                    },
                    x: { 
                        grid: { color: 'rgba(255,255,255,0.1)' }, 
                        ticks: { color: '#eef5ff', font: { size: 9 } } 
                    }
                }
            }
        });
    }

    async function loadData() {
        const refreshBtn = document.getElementById('refreshBtn');
        try {
            refreshBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Loading...';
            refreshBtn.disabled = true;
            
            // Fetch both solar and weather data in parallel
            const [solarResponse, weatherData] = await Promise.all([
                fetch("https://solar-backend-xv6j.onrender.com/predict"),
                fetchWeatherData()
            ]);
            
            if (!solarResponse.ok) throw new Error(`HTTP ${solarResponse.status}`);
            
            const solarData = await solarResponse.json();
            lastFetchTime = new Date();
            const parsedData = parseSolarData(solarData.output || solarData);
            
            // Update weather background and effects if weather data available
            if (weatherData && weatherData.current) {
                updateBackgroundTheme(weatherData.current.condition.text);
                createWeatherEffects(weatherData.current.condition.text);
            }
            
            renderDashboard(parsedData, weatherData);
            
            const lastUpdateSpan = document.getElementById('lastUpdate');
            if (lastUpdateSpan) lastUpdateSpan.innerHTML = lastFetchTime.toLocaleTimeString();
            
        } catch (error) {
            console.error('Error:', error);
            const fallbackParsed = parseSolarData("Power Output: 3.82 kW\nEnergy Yield: 11.4 kWh\nPanel Temperature: 46.2°C\nEfficiency: 19.2%\nCO2 Saved: 5.8 kg\nIrradiance: 712 W/m²");
            renderDashboard(fallbackParsed, null);
        } finally {
            refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh now';
            refreshBtn.disabled = false;
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Add last update display
    const statsRow = document.createElement('div');
    statsRow.style.cssText = 'display: flex; justify-content: flex-end; margin-bottom: 1rem;';
    statsRow.innerHTML = `<div style="background: rgba(0,31,75,0.5); padding: 0.3rem 1rem; border-radius: 20px; font-size: 0.7rem;">Last Update: <span id="lastUpdate">—</span></div>`;
    document.querySelector('.hero').appendChild(statsRow);

    document.getElementById("refreshBtn").addEventListener("click", () => loadData());
    
    // Auto refresh every 5 seconds
    setInterval(() => loadData(), 5000);
    
    // Initial load
    loadData();
</script>
</body>
</html>
